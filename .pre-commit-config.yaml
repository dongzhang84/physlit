repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: local
    hooks:
      - id: verify-prereg
        name: Verify pre-registration integrity
        entry: uv run python scripts/verify_prereg_integrity.py
        language: system
        files: ^predictions/.*\.md$
        pass_filenames: false
        # This hook only runs after Phase 5 (when prereg file exists).
        # Until then, it's a no-op because the file doesn't exist yet.

      - id: validate-specs
        name: Validate framework specs
        entry: uv run python scripts/validate_specs.py
        language: system
        files: ^frameworks/.*\.ya?ml$
        pass_filenames: false
